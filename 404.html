<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Xtrusio Outreach Engine</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Encodes the deep-link path into a query string, redirects to the app root,
      // where a small script in index.html restores the real URL via history.replaceState.
      var pathSegmentsToKeep = 1; // keep "/xtrusio-outreach-engine/" then redirect
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
